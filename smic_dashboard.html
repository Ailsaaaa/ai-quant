  * { margin: 0; padding: 0; box-sizing: border-box; }

  }
  .header {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: #fff;
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-left h1 { font-size: 24px; font-weight: 700; }
  .header-left .sub { font-size: 13px; color: #a0b4c8; margin-top: 4px; }
  .header-right { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { text-align: right; }
  .stat .label { font-size: 12px; color: #a0b4c8; text-transform: uppercase; }
  .stat .value { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .stat .value.up { color: #ef5350; }
  .stat .value.down { color: #26a69a; }
  .change-badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 700;
    margin-top: 4px;
  }
  .change-badge.up { background: rgba(239,83,80,0.15); color: #ef5350; }
  .change-badge.down { background: rgba(38,166,154,0.15); color: #26a69a; }

  .main-container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .panel {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 24px;
    border-bottom: 1px solid #f0f0f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-header h2 { font-size: 16px; font-weight: 600; color: #1a1a2e; }

  .panel-body { padding: 16px 8px 0 8px; }

  .kline-chart { width: 100%; height: 520px; }
  .volume-chart { width: 100%; height: 200px; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    padding: 20px 24px;
  }
  .stat-card {
    background: #f8f9fb;
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .stat-card .label { font-size: 12px; color: #999; margin-bottom: 6px; }
  .stat-card .num { font-size: 22px; font-weight: 700; }
  .stat-card .num.up { color: #ef5350; }
  .stat-card .num.down { color: #26a69a; }

  .footer {
    text-align: center;
    padding: 20px;
    color: #999;
    font-size: 12px;
  }

  @media (max-width: 768px) {
    .header { padding: 16px 20px; }
    .header-right { gap: 12px; }
    .stat .value { font-size: 16px; }
    .kline-chart { height: 360px; }
    .volume-chart { height: 150px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px 16px; }
    .stat-card { padding: 12px; }
    .stat-card .num { font-size: 18px; }
  }
</style>

// Build candlestick data: [open, close, low, high]

const volumes = RAW_DATA.map(r => r[5]);
const closes = RAW_DATA.map(r => r[4]);

// Volume coloring — match Chinese convention: up(red) / down(green)
// Determine up/down by comparing close to previous day's close
const volColors = [];
const volBorders = [];
for (let i = 0; i < RAW_DATA.length; i++) {
  if (i === 0) {
    volColors.push('#ef5350');
    volBorders.push('#ef5350');
  } else {
    const isUp = RAW_DATA[i][4] >= RAW_DATA[i-1][4];
    volColors.push(isUp ? '#ef5350' : '#26a69a');
    volBorders.push(isUp ? '#ef5350' : '#26a69a');
  }
}

// =========== K-LINE CHART ===========
const klineDom = document.getElementById('klineChart');
const klineChart = echarts.init(klineDom);

const klineOption = {
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'cross' },
    backgroundColor: 'rgba(26,26,46,0.92)',
    borderColor: '#333',
    textStyle: { color: '#fff', fontSize: 12 },
    formatter: function(params) {
      const d = params[0];
      if (!d) return '';
      const data = d.data;
      const date = d.axisValue;
      const color = data[1] >= data[0] ? '#ef5350' : '#26a69a';
      const arrow = data[1] >= data[0] ? '↑' : '↓';
      const change = data[1] - data[0];
      const pct = ((change / data[0]) * 100).toFixed(2);
      return `<div style="font-weight:700;margin-bottom:6px;">${date}</div>
        <div>开盘: <b>${data[0].toFixed(2)}</b></div>
        <div>收盘: <b style="color:${color}">${data[1].toFixed(2)}</b></div>
        <div>最低: <b>${data[2].toFixed(2)}</b></div>
        <div>最高: <b>${data[3].toFixed(2)}</b></div>
        <div style="margin-top:4px;color:${color}">${arrow} ${change.toFixed(2)} (${pct}%)</div>`;
    }
  },
  grid: { left: 60, right: 24, top: 20, bottom: 30 },
  xAxis: {
    type: 'category',
    data: dates,
    axisLine: { lineStyle: { color: '#ddd' } },
    axisLabel: {
      color: '#999',
      fontSize: 10,
      formatter: function(v) { return v.slice(5); }
    },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    scale: true,
    axisLabel: { color: '#999', fontSize: 11 },
    splitLine: { lineStyle: { color: '#f0f0f0' } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  series: [{
    type: 'candlestick',
    data: klineData,
    itemStyle: {
      color: '#ef5350',
      color0: '#26a69a',
      borderColor: '#ef5350',
      borderColor0: '#26a69a'
    },
    markLine: {
      silent: true,
      symbol: 'none',
      data: [
        { yAxis: RAW_DATA[0][1], lineStyle: { color: '#ccc', type: 'dashed', width: 1 }, label: { formatter: '起始' } }
      ]
    }
  }]
};

klineChart.setOption(klineOption);

// =========== VOLUME CHART ===========
const volDom = document.getElementById('volumeChart');
const volChart = echarts.init(volDom);

const volOption = {
  tooltip: {
    trigger: 'axis',
    backgroundColor: 'rgba(26,26,46,0.92)',
    borderColor: '#333',
    textStyle: { color: '#fff', fontSize: 12 },
    formatter: function(params) {
      if (!params || !params[0]) return '';
      const v = params[0].value;
      return `${params[0].axisValue}<br/>成交量: <b>${(v/10000).toFixed(0)} 万手</b>`;
    }
  },
  grid: { left: 60, right: 24, top: 10, bottom: 20 },
  xAxis: {
    type: 'category',
    data: dates,
    axisLine: { lineStyle: { color: '#ddd' } },
    axisLabel: {
      color: '#999',
      fontSize: 10,
      formatter: function(v) { return v.slice(5); }
    },
    axisTick: { show: false }
  },
  yAxis: {
    type: 'value',
    axisLabel: {
      color: '#999',
      fontSize: 10,
      formatter: function(v) { return (v/10000).toFixed(0) + '万'; }
    },
    splitLine: { lineStyle: { color: '#f0f0f0' } },
    axisLine: { show: false },
    axisTick: { show: false }
  },
  series: [{
    type: 'bar',
    data: volumes.map((v, i) => ({
      value: v,
      itemStyle: {
        color: volColors[i],
        borderRadius: [2, 2, 0, 0]
      }
    })),
    barWidth: '60%'
  }]
};

// =========== HEADER STATS ===========
const total = RAW_DATA.length;
const firstClose = RAW_DATA[0][4];
const lastClose = RAW_DATA[total - 1][4];
const change = lastClose - firstClose;
const pctChange = ((change / firstClose) * 100).toFixed(2);
const isUp = change >= 0;
const highPrice = Math.max(...RAW_DATA.map(r => r[3]));
const lowPrice = Math.min(...RAW_DATA.map(r => r[2]));
const avgVol = volumes.reduce((a,b)=>a+b,0) / volumes.length;

document.getElementById('headerStats').innerHTML = `
  <div class="stat">
    <div class="label">最新收盘价</div>
    <div class="value ${isUp ? 'up' : 'down'}">¥${lastClose.toFixed(2)}</div>
  </div>
  <div class="stat">
    <div class="label">近一年涨跌</div>
    <div class="value ${isUp ? 'up' : 'down'}">${change >= 0 ? '+' : ''}${change.toFixed(2)}</div>
    <span class="change-badge ${isUp ? 'up' : 'down'}">${change >= 0 ? '+' : ''}${pctChange}%</span>
  </div>
  <div class="stat">
    <div class="label">最高 / 最低</div>
    <div class="value" style="color:#333;">¥${highPrice.toFixed(2)} / ¥${lowPrice.toFixed(2)}</div>
  </div>
  <div class="stat">
    <div class="label">日均成交量</div>
    <div class="value" style="color:#333;">${(avgVol/10000).toFixed(0)}<span style="font-size:12px;font-weight:400;"> 万手</span></div>
  </div>
`;

document.getElementById('dateRange').textContent = `${RAW_DATA[0][0]} — ${RAW_DATA[total-1][0]} · 共 ${total} 个交易日`;

// =========== STATS PANEL ===========
const monthGroups = {};
RAW_DATA.forEach(r => {
  const m = r[0].slice(0, 7);
  if (!monthGroups[m]) monthGroups[m] = { up: 0, down: 0, total: 0 };
  monthGroups[m].total++;
});

// Count up/down days
for (let i = 1; i < RAW_DATA.length; i++) {
  const m = RAW_DATA[i][0].slice(0, 7);
  if (RAW_DATA[i][4] >= RAW_DATA[i-1][4]) monthGroups[m].up++;
  else monthGroups[m].down++;
}

let statsHtml = '<div class="panel-header"><h2>月度统计</h2></div><div class="stats-row">';
Object.entries(monthGroups).reverse().forEach(([m, s]) => {
  const upPct = s.total > 0 ? ((s.up / s.total) * 100).toFixed(0) : 0;
  statsHtml += `<div class="stat-card">
    <div class="label">${m}</div>
    <div class="num up" style="font-size:14px;">涨 ${s.up} 天</div>
    <div class="num down" style="font-size:14px;">跌 ${s.down} 天</div>
    <div style="font-size:11px;color:#999;margin-top:4px;">${upPct}% 上涨率</div>
  </div>`;
});
statsHtml += '</div>';
document.getElementById('statsPanel').innerHTML = statsHtml;

// =========== LINK CHARTS ===========
klineChart.group = 'smic';
volChart.group = 'smic';
echarts.connect('smic');

// ========= RESIZE =========
window.addEventListener('resize', () => {
  klineChart.resize();
  volChart.resize();
});
